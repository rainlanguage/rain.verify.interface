[package]
name = "rain-verify-interface"
version = "0.1.1"

[profile.default]
libs = ['dependencies']

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"
optimizer = true
optimizer_runs = 100000

# pre push0 for maximum compatibility
evm_version = "cancun"

bytecode_hash = "none"
cbor_metadata = false

[dependencies]
forge-std = "1.16.1"

[soldeer]
recursive_deps = false
